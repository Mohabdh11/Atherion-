name: AetherionNOC — Build APK

# ─── Triggers ────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:             # Manual trigger from GitHub UI
    inputs:
      flavor:
        description: 'Build flavor'
        required: true
        default: 'dev'
        type: choice
        options: [ dev, staging, prod ]
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options: [ debug, release ]

# ─── Global env ──────────────────────────────────────────────────────────────
env:
  JAVA_VERSION: '17'
  GRADLE_VERSION: '8.7'
  GRADLE_OPTS: >-
    -Dorg.gradle.jvmargs=-Xmx2g
    -Dorg.gradle.daemon=false
    -Dorg.gradle.parallel=true
    -Dkotlin.incremental=false

# ─── Jobs ─────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Build Debug APK (dev flavor — always runs) ──────────────────────────
  build-debug:
    name: Build Dev Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Restore Gradle cache
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # 3. Java 17
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      # 4. Gradle ${{ env.GRADLE_VERSION }}
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      # 5. Build
      - name: Build devDebug APK
        run: gradle assembleDevDebug --no-daemon --stacktrace

      # 6. Rename APK with commit SHA
      - name: Rename APK
        run: |
          mkdir -p artifacts
          APK=$(find app/build/outputs/apk/dev/debug -name "*.apk" | head -1)
          cp "$APK" "artifacts/AetherionNOC-dev-debug-${{ github.sha }}.apk"

      # 7. Upload
      - name: Upload Dev Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AetherionNOC-dev-debug-${{ github.sha }}
          path: artifacts/*.apk
          retention-days: 14

  # ── 2. Build Release APK (runs only on main/master push or manual trigger) ──
  build-release:
    name: Build ${{ github.event.inputs.flavor || 'dev' }} Release APK
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
      || github.event_name == 'workflow_dispatch'

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Restore Gradle cache
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # 3. Java 17
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      # 4. Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      # 5. Decode keystore from GitHub Secret (base64-encoded .jks)
      #    Add secret KEYSTORE_BASE64 in: Settings → Secrets → Actions
      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p app/keystore
          echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore/aetherion-release.jks
          echo "Keystore decoded successfully"

      # 6. Determine flavor from input or branch
      - name: Resolve flavor
        id: flavor
        run: |
          FLAVOR="${{ github.event.inputs.flavor }}"
          if [ -z "$FLAVOR" ]; then
            FLAVOR="dev"
          fi
          # Capitalize first letter for Gradle task name
          FLAVOR_CAP="$(echo "${FLAVOR:0:1}" | tr '[:lower:]' '[:upper:]')${FLAVOR:1}"
          echo "flavor=$FLAVOR" >> $GITHUB_OUTPUT
          echo "flavor_cap=$FLAVOR_CAP" >> $GITHUB_OUTPUT
          echo "Building flavor: $FLAVOR ($FLAVOR_CAP)"

      # 7. Build Release APK
      - name: Build ${{ steps.flavor.outputs.flavor }} Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          gradle assemble${{ steps.flavor.outputs.flavor_cap }}Release \
            --no-daemon \
            --stacktrace

      # 8. Rename APK
      - name: Rename APK
        run: |
          mkdir -p artifacts
          FLAVOR="${{ steps.flavor.outputs.flavor }}"
          APK=$(find app/build/outputs/apk/$FLAVOR/release -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: APK not found in app/build/outputs/apk/$FLAVOR/release/"
            find app/build/outputs/apk -name "*.apk"
            exit 1
          fi
          cp "$APK" "artifacts/AetherionNOC-${FLAVOR}-release-${{ github.sha }}.apk"
          echo "APK ready: artifacts/AetherionNOC-${FLAVOR}-release-${{ github.sha }}.apk"

      # 9. Upload
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: AetherionNOC-${{ steps.flavor.outputs.flavor }}-release-${{ github.sha }}
          path: artifacts/*.apk
          retention-days: 30

      # 10. Clean keystore from runner
      - name: Clean keystore
        if: always()
        run: rm -f app/keystore/aetherion-release.jks
