name: Aetherion NOC — Android CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_flavor:
        description: 'Build Flavor'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

jobs:
  # ─────────────────────────────────────────
  # 1. Code Quality & Unit Tests
  # ─────────────────────────────────────────
  test:
    name: 🧪 Unit Tests & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Run Lint (dev debug)
        run: ./gradlew lintDevDebug

      - name: Run Unit Tests
        run: ./gradlew testDevDebugUnitTest

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-*.html
          retention-days: 7

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/
          retention-days: 7

  # ─────────────────────────────────────────
  # 2. Build Debug APK (dev flavor)
  # ─────────────────────────────────────────
  build-debug:
    name: 🔨 Build Debug APK
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v3

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 --decode > app/google-services.json
          else
            echo "⚠️ GOOGLE_SERVICES_JSON secret not set — using placeholder"
            cp app/google-services.json.placeholder app/google-services.json 2>/dev/null || echo '{"project_info":{"project_id":"placeholder"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000"},"oauth_client":[],"api_key":[{"current_key":"placeholder"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}' > app/google-services.json
          fi

      - name: Build Dev Debug APK
        run: ./gradlew assembleDevDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: aetherion-dev-debug-${{ github.sha }}
          path: app/build/outputs/apk/dev/debug/*.apk
          retention-days: 14

  # ─────────────────────────────────────────
  # 3. Build Release AAB (signed)
  # ─────────────────────────────────────────
  build-release:
    name: 🚀 Build Release AAB (Signed)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v3

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode > app/google-services.json

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p keystore
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore/aetherion-release.jks

      - name: Build Production Release AAB
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore/aetherion-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleProdRelease

      - name: Build Staging Release AAB
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore/aetherion-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleStagingRelease

      - name: Upload Production AAB
        uses: actions/upload-artifact@v4
        with:
          name: aetherion-prod-release-aab-${{ github.sha }}
          path: app/build/outputs/bundle/prodRelease/*.aab
          retention-days: 30

      - name: Upload Staging AAB
        uses: actions/upload-artifact@v4
        with:
          name: aetherion-staging-release-aab-${{ github.sha }}
          path: app/build/outputs/bundle/stagingRelease/*.aab
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/bundle/prodRelease/*.aab
            app/build/outputs/apk/prod/release/*.apk
          generate_release_notes: true
